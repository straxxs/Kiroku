<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - KIROKU</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<div class="doodles">
    <i data-lucide="pencil" class="d1"></i>
    <i data-lucide="file-text" class="d2"></i>
    <i data-lucide="book-open" class="d3"></i>
    <i data-lucide="star" class="d4"></i>
    <i data-lucide="paperclip" class="d5"></i>
    <i data-lucide="clipboard-list" class="d6"></i>
    <i data-lucide="graduation-cap" class="d7"></i>
    <i data-lucide="lightbulb" class="d8"></i>
    <i data-lucide="book-marked" class="d9"></i>
    <i data-lucide="palette" class="d10"></i>
    <i data-lucide="flask-conical" class="d11"></i>
    <i data-lucide="scissors" class="d12"></i>
    <i data-lucide="ruler" class="d13"></i>
    <i data-lucide="paintbrush" class="d14"></i>
    <i data-lucide="school" class="d15"></i>
    <i data-lucide="hash" class="d16"></i>
    <i data-lucide="compass" class="d17"></i>
    <i data-lucide="target" class="d18"></i>
    <i data-lucide="feather" class="d19"></i>
    <i data-lucide="bookmark" class="d20"></i>
    <i data-lucide="globe" class="d21"></i>
    <i data-lucide="atom" class="d22"></i>
    <i data-lucide="music" class="d23"></i>
    <i data-lucide="brain" class="d24"></i>
</div>

<div class="container">
    <div class="spiral" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="titulo-wrap">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="KIROKU" class="logo-auth">
        <p class="subtitulo">Creá tu cuenta</p>
    </div>

    <form id="registroForm" novalidate>
        <div class="campo">
            <label for="nombre">Usuario</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: juan_perez" required
                   minlength="3" maxlength="20" autocomplete="username">
            <small class="campo-hint">3-20 caracteres. Letras, números y guión bajo.</small>
        </div>
        <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required
                   maxlength="254" autocomplete="email">
        </div>
        <div class="campo">
            <label for="contraseña">Contraseña</label>
            <div class="campo-password">
                <input type="password" id="contraseña" name="contraseña" placeholder="Mínimo 8 caracteres" required
                       minlength="8" maxlength="128" autocomplete="new-password">
                <button type="button" class="btn-toggle-pass" aria-label="Mostrar contraseña"
                        onclick="togglePass('contraseña', this)">
                    <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <div id="barra-fortaleza" class="barra-fortaleza" aria-live="polite">
                <div class="barra-fortaleza-fill"></div>
            </div>
            <small id="texto-fortaleza" class="campo-hint"></small>
            <ul id="requisitos" class="requisitos">
                <li data-req="len">Mínimo 8 caracteres</li>
                <li data-req="mayus">1 letra mayúscula</li>
                <li data-req="minus">1 letra minúscula</li>
                <li data-req="num">1 número</li>
            </ul>
        </div>
        <div class="campo">
            <label for="confirmar_contraseña">Confirmar contraseña</label>
            <div class="campo-password">
                <input type="password" id="confirmar_contraseña" name="confirmar_contraseña"
                       placeholder="Repetí tu contraseña" required minlength="8" maxlength="128"
                       autocomplete="new-password">
                <button type="button" class="btn-toggle-pass" aria-label="Mostrar contraseña"
                        onclick="togglePass('confirmar_contraseña', this)">
                    <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <small id="msg-confirmar" class="campo-hint"></small>
        </div>
        <button type="submit" class="btn-enviar">Registrarse</button>
    </form>

    <p class="enlace-secundario">¿Ya tenés cuenta? <a href="/login">Iniciar sesión</a></p>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/sounds.js') }}"></script>
<script src="{{ url_for('static', filename='js/registro.js') }}"></script>
</body>
</html>
