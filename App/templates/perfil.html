<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil - Apuntec</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/panel.css') }}">
</head>
<body data-avatar-actual="{{ usuario.avatar.split('/')[-1] if usuario.avatar else '' }}">

<div class="topbar">
    <a href="/home" class="apuntec-btn"><h1>📚 Apuntti</h1></a>
    <div class="perfil-menu">
        <img id="perfilAvatar" class="perfil-avatar"
            src="{{ url_for('static', filename=session_avatar) }}" alt="Mi avatar">

        <div id="perfilDropdown" class="dropdown-menu">
            <div class="dropdown-header">{{ nombre }}</div>
            {% if session_id_curso %}
                <a href="/curso/{{ session_id_curso }}">Mi curso</a>
            {% endif %}
            <a href="/home">Inicio</a>
            {% if rol == 'admin' %}<a href="/admin">Panel admin</a>{% endif %}
            <hr>
            <a href="/logout" class="item-logout">Cerrar sesión</a>
        </div>
    </div>
</div>

<div class="wrapper">
    <div class="card">
        <h2>Datos de la cuenta</h2>

        <div style="text-align:center; margin-bottom:20px;">
            <img id="avatarPreview"
                src="{{ url_for('static', filename=usuario.avatar) if usuario.avatar else url_for('static', filename='uploads/avatares/no_avatar.png') }}"
                alt="Avatar actual"
                style="width:110px;height:110px;border-radius:50%;object-fit:cover;
                    box-shadow:0 0 0 4px var(--celeste);">
        </div>

        <form id="formPerfil">
            <div class="campo">
                <label for="nombre">Nombre de usuario</label>
                <input type="text" id="nombre" name="nombre" value="{{ usuario.nombre }}" required>
            </div>

            <label style="margin-top:8px;">Elegí tu avatar</label>
            <div class="avatar-grid" id="avatarGrid">
                {% for i in range(0, 10) %}
                    {% set nombre_archivo = 'avatar' ~ i ~ '.png' %}
                    <img src="{{ url_for('static', filename='uploads/avatares/' ~ nombre_archivo) }}"
                        class="avatar-opcion"
                        data-avatar="{{ nombre_archivo }}"
                        alt="Avatar {{ i }}">
                {% endfor %}
            </div>

            <!-- Guarda el avatar elegido -->
            <input type="hidden" id="avatarElegido" name="avatar" value="">

            <button type="submit" class="btn btn-amarillo" style="margin-top:16px;">Guardar cambios</button>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/avatar.js') }}"></script>
<script src="{{ url_for('static', filename='js/topbar.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/perfil.js') }}"></script>
</body>
</html>
