<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ materia.nombre }} - Apuntec</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/panel.css') }}">
</head>
<body data-id-materia="{{ materia.id }}"
    data-puede-gestionar="{{ 'true' if puede_gestionar else 'false' }}">

<div class="topbar">
    <h1>📖 {{ materia.nombre }}</h1>
    <div class="nav-links">
        <a href="/home">Inicio</a>
        <a href="/curso/{{ curso.id }}">Volver al curso</a>
        <a href="/perfil">Mi perfil</a>
        <a class="logout" href="/logout">Cerrar sesión</a>
    </div>
</div>

<div class="wrapper">
    <div class="card">
        <h2>Información de la materia</h2>
        <p><strong>{{ materia.nombre }}</strong></p>
        <p>Profesor/a: {{ materia.nombre_profesor or 'Sin asignar' }}</p>
        <p>Curso: {{ curso.anio }}° {{ curso.division }}</p>
    </div>

    <div class="card">
        <h2>Subir un apunte</h2>
        <form id="formApunte" enctype="multipart/form-data">
            <div class="campo">
                <label for="descripcion">Descripción (opcional)</label>
                <input type="text" id="descripcion" name="descripcion"
                       placeholder="Ej: Resumen del primer parcial">
            </div>
            <div class="form-row">
                <div class="campo">
                    <label for="archivo">Archivo</label>
                    <input type="file" id="archivo" name="archivo" required>
                </div>
                <button type="submit" class="btn btn-amarillo">Subir apunte</button>
            </div>
        </form>
    </div>

    <div class="card">
        <h2>Apuntes de la materia</h2>
        <div id="listaApuntes"><p class="vacio">Cargando...</p></div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/apuntes.js') }}"></script>
</body>
</html>
